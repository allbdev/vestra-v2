services:
  postgres:
    image: postgres:15-alpine
    container_name: vestra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vestra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d vestra"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: finance_postgres_data
    external: true
