# fly.toml app configuration file generated for vestra-api on 2026-05-12T11:41:24-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vestra-api'
primary_region = 'gru'

# Dockerfile + build context passed via CLI flags so paths stay relative to
# repo root (the Dockerfile COPYs pnpm-workspace.yaml + packages/* from there).
# See DEPLOYMENT.md §1c.

[deploy]
  strategy = 'rolling'
  release_command = 'prisma migrate deploy'

[env]
  NODE_ENV = 'production'
  PORT = '3001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
